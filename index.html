<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS WiFi • Internet Lifeline</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at center, #2c343d 0%, #232a31 45%, #1a2027 75%, #11171e 100%);
      background-attachment: fixed;
    }

    .lifeline {
      color: #FF6A1A;
      text-shadow: 0 0 20px rgba(255, 106, 26, 0.6);
    }
  </style>
</head>

<body class="text-white min-h-screen">
  <div class="max-w-lg mx-auto px-5 pt-6 pb-12">

    <!-- Logo + Hero (unchanged) -->
    <div class="flex justify-center mb-6">
      <img src="SOS-Wi-Fi-png.png" alt="SOS WiFi Logo" class="h-20 w-auto drop-shadow-2xl">
    </div>

    <div class="text-center mb-10">
      <p class="lifeline font-semibold tracking-[3px] text-xl mb-3">
        YOUR INTERNET LIFELINE
      </p>
      <h1 class="text-5xl font-bold tracking-tighter leading-none mb-6">
        20 minutes of<br>fast WiFi
      </h1>
      <div class="inline-flex items-center gap-2 text-zinc-400 text-sm font-medium">
        <span class="text-lg">☀️</span>
        Powered by Sunshine (Starlink)
      </div>
    </div>

    <!-- Cards -->
    <div class="space-y-8">

      <!-- Gold -->
      <div class="relative bg-zinc-900/95 backdrop-blur-xl rounded-3xl p-8 border-2 border-[#FF6A1A] ring-2 ring-[#FF6A1A]/50">
        <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#FF6A1A] text-black text-xs font-bold px-8 py-1.5 rounded-3xl shadow-xl">
          MOST POPULAR
        </div>

        <div class="text-center mb-8">
          <div class="text-[#FF6A1A] font-semibold tracking-widest text-sm mb-1">GOLD</div>
          <div class="text-7xl font-bold text-white mb-1">£10</div>
          <div class="text-zinc-400 text-lg">15 Mbps • 20 minutes</div>
        </div>

        <div class="flex gap-6 items-start">
          <!-- Features -->
          <div class="flex-1">
            <ul class="space-y-3 text-zinc-200 text-[15.5px]">
              <li class="flex items-start gap-3"><span class="text-[#FF6A1A] mt-0.5 text-xl">✔</span> Streaming & video calls</li>
              <li class="flex items-start gap-3"><span class="text-[#FF6A1A] mt-0.5 text-xl">✔</span> YouTube, live streams</li>
              <li class="flex items-start gap-3"><span class="text-[#FF6A1A] mt-0.5 text-xl">✔</span> Multiple devices</li>
            </ul>
          </div>

          <!-- Payment Icons with subtle light panel -->
          <div class="w-24 flex-shrink-0">
            <div class="bg-zinc-800/70 rounded-2xl p-3">
              <div class="grid grid-cols-2 gap-3 text-3xl text-zinc-300">
                <i class="fa-brands fa-cc-visa"></i>
                <i class="fa-brands fa-cc-mastercard"></i>
                <i class="fa-brands fa-apple-pay"></i>
                <i class="fa-brands fa-google-pay"></i>
              </div>
            </div>
          </div>
        </div>

        <a href="YOUR_GOLD_STRIPE_LINK" target="_blank"
           class="mt-10 block w-full py-4 bg-[#FF6A1A] hover:bg-orange-500 text-black font-semibold rounded-2xl text-center text-lg shadow-lg active:scale-[0.97]">
          Pay £10 now
        </a>
      </div>

      <!-- Economy & Deluxe follow the same pattern (shorter features) -->
      <!-- ... (same structure as Gold, just change title, price, speed, and feature list) ... -->

    </div>

    <p class="text-center text-zinc-500 text-xs mt-12">
      © SOS WiFi • Powered By 100% Renewable Energy
    </p>

  </div>
</body>
</html>
